[build]
builder = "nixpacks"

[deploy]
# startCommand and healthcheckPath intentionally omitted —
# set per-service in Railway dashboard so web and worker can differ:
#   web service    → start: uvicorn ...  healthcheck: /health
#   worker service → start: python worker.py  healthcheck: none
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
