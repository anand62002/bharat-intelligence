name: Deploy — Production

on:
  push:
    branches: [main]

# Railway and Vercel auto-deploy on push to main via their GitHub integrations.
# This workflow only sends a Telegram notification confirming the push landed.

jobs:
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=format:'%s')"  >> "$GITHUB_OUTPUT"
          echo "sha=$(git log -1 --pretty=format:'%h')"      >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty=format:'%an')"  >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        run: |
          TEXT="🚀 *New deployment to production*

Commit: \`${{ steps.commit.outputs.sha }}\`
Author: ${{ steps.commit.outputs.author }}
Message: ${{ steps.commit.outputs.message }}

Railway + Vercel are redeploying automatically.
View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${TEXT}"
